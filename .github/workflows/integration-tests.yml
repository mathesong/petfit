name: Integration Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_docker:
        description: 'Run Docker container tests'
        required: false
        type: boolean
        default: true
      run_singularity:
        description: 'Run Singularity/Apptainer container tests'
        required: false
        type: boolean
        default: true

# Cancel in-progress runs for the same PR/branch
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  PETFIT_TESTDATA_RELEASE_TAG: testdata-v1.0
  PETFIT_TESTDATA_FILENAME: ds004869_testdata.tar.gz
  R_LIBS_USER: ${{ github.workspace }}/R-lib

jobs:
  # =========================================================================
  # Job 1: R-native integration tests
  # =========================================================================
  r-native:
    name: R-native integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Setup R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::devtools, any::testthat

      - name: Cache test data
        uses: actions/cache@v4
        id: cache-testdata
        with:
          path: /tmp/petfit_integration
          key: testdata-${{ env.PETFIT_TESTDATA_RELEASE_TAG }}

      - name: Download test data
        if: steps.cache-testdata.outputs.cache-hit != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p /tmp/petfit_integration
          gh release download ${{ env.PETFIT_TESTDATA_RELEASE_TAG }} \
            --repo ${{ github.repository }} \
            --pattern ${{ env.PETFIT_TESTDATA_FILENAME }} \
            --dir /tmp/petfit_integration

      - name: Run integration tests
        env:
          PETFIT_INTEGRATION_TESTS: "true"
          PETFIT_TESTDATA_PATH: /tmp/petfit_integration/${{ env.PETFIT_TESTDATA_FILENAME }}
          PETFIT_INTEGRATION_CACHE: /tmp/petfit_integration
        run: |
          Rscript -e "devtools::test(filter = 'integration')"

  # =========================================================================
  # Job 2: Docker container tests
  # =========================================================================
  docker:
    name: Docker container tests
    runs-on: ubuntu-latest
    timeout-minutes: 90
    if: >-
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.run_docker == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Setup R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::devtools, any::testthat

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          load: true
          tags: mathesong/petfit:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Cache test data
        uses: actions/cache@v4
        id: cache-testdata
        with:
          path: /tmp/petfit_integration
          key: testdata-${{ env.PETFIT_TESTDATA_RELEASE_TAG }}

      - name: Download test data
        if: steps.cache-testdata.outputs.cache-hit != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p /tmp/petfit_integration
          gh release download ${{ env.PETFIT_TESTDATA_RELEASE_TAG }} \
            --repo ${{ github.repository }} \
            --pattern ${{ env.PETFIT_TESTDATA_FILENAME }} \
            --dir /tmp/petfit_integration

      - name: Run Docker integration tests
        env:
          PETFIT_INTEGRATION_TESTS: "true"
          PETFIT_DOCKER_TESTS: "true"
          PETFIT_TESTDATA_PATH: /tmp/petfit_integration/${{ env.PETFIT_TESTDATA_FILENAME }}
          PETFIT_INTEGRATION_CACHE: /tmp/petfit_integration
        run: |
          Rscript -e "devtools::test(filter = 'integration-docker')"

  # =========================================================================
  # Job 3: Apptainer/Singularity container tests
  # =========================================================================
  singularity:
    name: Apptainer container tests
    runs-on: ubuntu-latest
    timeout-minutes: 90
    if: >-
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.run_singularity == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Setup R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::devtools, any::testthat

      - name: Setup Apptainer
        uses: eWaterCycle/setup-apptainer@v2
        with:
          apptainer-version: 1.3.4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (for Apptainer to use)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          load: true
          tags: mathesong/petfit:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Cache test data
        uses: actions/cache@v4
        id: cache-testdata
        with:
          path: /tmp/petfit_integration
          key: testdata-${{ env.PETFIT_TESTDATA_RELEASE_TAG }}

      - name: Download test data
        if: steps.cache-testdata.outputs.cache-hit != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p /tmp/petfit_integration
          gh release download ${{ env.PETFIT_TESTDATA_RELEASE_TAG }} \
            --repo ${{ github.repository }} \
            --pattern ${{ env.PETFIT_TESTDATA_FILENAME }} \
            --dir /tmp/petfit_integration

      - name: Run Singularity integration tests
        env:
          PETFIT_INTEGRATION_TESTS: "true"
          PETFIT_SINGULARITY_TESTS: "true"
          PETFIT_TESTDATA_PATH: /tmp/petfit_integration/${{ env.PETFIT_TESTDATA_FILENAME }}
          PETFIT_INTEGRATION_CACHE: /tmp/petfit_integration
        run: |
          Rscript -e "devtools::test(filter = 'integration-singularity')"
